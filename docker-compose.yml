version: "3.8"

services:
  relay:
    build: .
    ports:
      - "${PORT:-4080}:8080"
    environment:
      - RELAY_SECRET=${RELAY_SECRET}
      - DB_PATH=/data/ccrelay.db
    volumes:
      - ccrelay-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ccrelay-data:
